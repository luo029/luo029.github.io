baseURL = 'https://taoyifan.cn/'
languageCode = 'zh-cn'
title = '养真斋'
theme = 'nostyleplease'
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      hardWraps = true

[params.giscus]
        data-repo="luo029/true_blog_comments"
        data-repo-id="R_kgDOS5PyGg"
        data-category="Announcements"
        data-category-id="DIC_kwDOS5PyGs4C_DqG"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="preferred_color_scheme"
        data-lang="zh-CN"
        data-loading="lazy"
        crossorigin="anonymous"

[permalinks]
  posts = "/:slug/"
  [permalinks.page]
    '/' = '/:slug/'
  [permalinks.term]
    tags = '/:slug/'